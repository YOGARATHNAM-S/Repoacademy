<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirect</title>
    <script>
      const path = window.location.pathname;
      const segments = path.split('/');
      
      // For GitHub Pages at https://user.github.io/repo-name/
      // Redirect to /repo-name/ (index) and store the path
      if (segments[1] === 'RepoAcademy') {
        // Remove the first empty element and 'RepoAcademy', keep the rest
        const route = '/' + segments.slice(2).join('/');
        sessionStorage.setItem('redirect', route);
        window.location.replace('/RepoAcademy/');
      }
    </script>
  </head>
  <body>
  </body>
</html>
