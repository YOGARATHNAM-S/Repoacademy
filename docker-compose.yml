version: '3.8'

services:
  backend:
    build: ./backend
    container_name: repolearn-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - repolearn-network

  frontend:
    build: ./frontend
    container_name: repolearn-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:5000
    restart: unless-stopped
    networks:
      - repolearn-network

networks:
  repolearn-network:
    driver: bridge
